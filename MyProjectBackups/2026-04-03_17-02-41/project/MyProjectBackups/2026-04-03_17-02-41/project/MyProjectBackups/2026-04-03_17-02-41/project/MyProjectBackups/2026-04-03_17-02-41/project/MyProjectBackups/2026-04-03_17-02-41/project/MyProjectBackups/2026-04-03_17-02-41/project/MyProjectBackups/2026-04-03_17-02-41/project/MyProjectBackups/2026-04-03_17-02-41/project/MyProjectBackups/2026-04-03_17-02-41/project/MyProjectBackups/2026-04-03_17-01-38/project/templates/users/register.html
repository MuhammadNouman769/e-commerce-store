
<style>
    .register-wrapper {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #f8fafc, #eef2f7);
        font-family: 'Inter', system-ui, sans-serif;
    }
    
    .register-card {
        width: 100%;
        max-width: 480px;
        background: white;
        border-radius: 20px;
        padding: 50px 40px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.07);
        border: 1px solid #f1f5f9;
        transition: 0.3s ease;
    }
    
    .register-card:hover {
        transform: translateY(-4px);
        box-shadow: 0 25px 70px rgba(0, 0, 0, 0.09);
    }
    
    .register-card h3 {
        font-size: 26px;
        font-weight: 600;
        text-align: center;
        margin-bottom: 10px;
        color: #1e2937;
    }
    
    .register-card p {
        text-align: center;
        font-size: 15px;
        color: #64748b;
        margin-bottom: 40px;
    }
    
    .form-control {
        height: 52px;
        border-radius: 12px;
        border: 1.5px solid #e2e8f0;
        padding: 0 16px;
        font-size: 15px;
        transition: all 0.3s ease;
        width: 100%;
    }
    
    .form-control:focus {
        border-color: #f97316;
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
        outline: none;
    }
    
    .input-group-custom {
        position: relative;
        margin-bottom: 22px;   /* Yeh upr-niche gap ke liye hai */
    }
    
    .input-group-custom i {
        position: absolute;
        top: 50%;
        left: 16px;
        transform: translateY(-50%);
        color: #f9f9f9;
        font-size: 17px;
    }
    
    .input-group-custom input {
        padding-left: 48px;
    }
    
    .row {
        display: flex;
        gap: 18px;
        margin-bottom: 10px;   /* Extra gap row ke neeche */
    }
    
    .primary-btn {
        width: 100%;
        height: 54px;
        border-radius: 12px;
        background: linear-gradient(135deg, #f97316, #fb923c);
        color: #fff;
        font-weight: 600;
        font-size: 16px;
        border: none;
        cursor: pointer;
        margin-top: 20px;
        transition: all 0.3s ease;
    }
    
    .primary-btn:hover {
        color: linear-gradient(135deg, #ea580c, #f97316);
        transform: translateY(-2px);
        background-color: #f1f5f9;
    }
    
    .links {
        text-align: center;
        margin-top: 30px;
        font-size: 15px;
        color: #64748b;
    }
    
    .links a {
        color: #f97316;
        font-weight: 600;
        text-decoration: none;
    }
    
    .links a:hover {
        text-decoration: underline;
    }
    
    .alert {
        border-radius: 10px;
        padding: 12px 16px;
        font-size: 14.5px;
        margin-bottom: 25px;
        text-align: center;
        background: #fef3c7;
        color: #c2410c;
        border: 1px solid #fcd34d;
    }
    </style>
    
    <div class="register-wrapper mt-5">
        <div class="register-card">
    
            <h3>Create Account</h3>
            <p>Start your journey with us</p>
    
            {% if messages %}
                {% for message in messages %}
                    <div class="alert alert-danger text-center">
                        {{ message }}
                    </div>
                {% endfor %}
            {% endif %}
    
            <form method="post" action="{% url 'register' %}">
                {% csrf_token %}
    
                <!-- Hidden fields -->
                <input type="hidden" name="role" value="{{ request.GET.role }}">
                <input type="hidden" name="next" value="{{ request.GET.next }}">
    
                <!-- First & Last Name -->
                <div class="row">
                    <div class="col-md-6 input-group-custom">
                        <i>👤</i>
                        <input type="text" name="first_name" class="form-control" placeholder="First name" required>
                    </div>
    
                    <div class="col-md-6 input-group-custom">
                        <i>👤</i>
                        <input type="text" name="last_name" class="form-control" placeholder="Last name" required>
                    </div>
                </div>
    
                <!-- Email -->
                <div class="input-group-custom">
                    <i>📧</i>
                    <input type="email" name="email" class="form-control" placeholder="Email address" required>
                </div>
    
                <!-- Phone -->
                <div class="input-group-custom">
                    <i>📱</i>
                    <input type="text" name="phone" class="form-control" placeholder="Phone number" required>
                </div>
    
                <!-- Passwords -->
                <div class="row">
                    <div class="col-md-6 input-group-custom">
                        <i>🔒</i>
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
    
                    <div class="col-md-6 input-group-custom">
                        <i>🔒</i>
                        <input type="password" name="password2" class="form-control" placeholder="Confirm password" required>
                    </div>
                </div>
    
                <div>
                    <button type="submit" class="primary-btn">Create Account</button>
                </div>
    
                <div class="links">
                    <p class="mt-3">
                        Already have an account? 
                        <a href="{% url 'login' %}?role={{ request.GET.role }}&next={{ request.GET.next }}">
                            Login
                        </a>
                    </p>
                </div>
    
            </form>
        </div>
    </div>
