{% extends "base.html" %}
{% block content %}
<title>{% block title %}B.Store - Choose Role{% endblock %}</title>

<style>
.login-wrapper {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #f8fafc, #eef2f7);
    font-family: 'Inter', system-ui, sans-serif;
}

.login-card {
    width: 100%;
    max-width: 420px;
    background: white;
    border-radius: 20px;
    padding: 50px 40px;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.07);
    border: 1px solid #f1f5f9;
    transition: 0.3s ease;
}

.login-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 25px 70px rgba(0, 0, 0, 0.09);
}

.login-card h3 {
    font-size: 26px;
    font-weight: 600;
    text-align: center;
    margin-bottom: 10px;
    color: #1e2937;
}

.login-card p {
    text-align: center;
    font-size: 15px;
    color: #64748b;
    margin-bottom: 40px;
}

.form-control {
    height: 52px;
    border-radius: 12px;
    border: 1.5px solid #e2e8f0;
    padding: 0 16px;
    font-size: 15px;
    transition: all 0.3s ease;
    width: 100%;
}

.form-control:focus {
    border-color: #f97316;
    box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.12);
    outline: none;
}

.input-group-custom {
    position: relative;
    margin-bottom: 22px;
}

.input-group-custom i {
    position: absolute;
    top: 50%;
    left: 16px;
    transform: translateY(-50%);
    color: #94a3b8;
    font-size: 17px;
}

.input-group-custom input {
    padding-left: 48px;
}

.password-toggle {
    position: absolute;
    top: 50%;
    right: 16px;
    transform: translateY(-50%);
    cursor: pointer;
    font-size: 18px;
    color: #94a3b8;
    background: none;
    border: none;
    padding: 0;
}

.primary-btn {
    width: 100%;
    height: 54px;
    border-radius: 12px;
    background: linear-gradient(135deg, #f97316, #fb923c);
    color: #fff;
    font-weight: 600;
    font-size: 16px;
    border: none;
    cursor: pointer;
    margin-top: 20px;
    transition: all 0.3s ease;
}

.primary-btn:hover {
    background: linear-gradient(135deg, #ea580c, #f97316);
    transform: translateY(-2px);
}

.links {
    text-align: center;
    margin-top: 30px;
    font-size: 15px;
    color: #64748b;
}

.links a {
    display: block;
    margin-top: 10px;
    text-decoration: none;
    color: #f97316;
    font-weight: 600;
}

.links a:hover {
    text-decoration: underline;
}

.alert {
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 14.5px;
    margin-bottom: 25px;
    text-align: center;
    background: #fef3c7;
    color: #c2410c;
    border: 1px solid #fcd34d;
}
</style>

<div class="login-wrapper mt-3">
    <div class="login-card">

        <h3>Welcome Back 👋</h3>
        <p>Login to your account</p>

        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-danger text-center">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <!-- Hidden fields -->
            <input type="hidden" name="next" value="{{ request.GET.next|default:'' }}">
            <input type="hidden" name="role" value="{{ request.GET.role }}">

            <!-- Email -->
            <div class="input-group-custom">
                <i>📧</i>
                <input type="email" name="email" class="form-control" placeholder="Email address" required>
            </div>

            <!-- Password -->
            <div class="input-group-custom">
                <i>🔒</i>
                <input type="password" name="password" id="passwordField" class="form-control" placeholder="Password" required>
                <span class="password-toggle" onclick="togglePassword()">👁️</span>
            </div>

            <!-- Button -->
            <div>
                <button type="submit" class="primary-btn">
                    {% if request.GET.role == "seller" %}
                        Login as Seller
                    {% else %}
                        Login
                    {% endif %}
                </button>
            </div>

            <!-- Links -->
            <div class="links">
                <a href="{% url 'register' %}?role={{ request.GET.role }}&next={{ request.GET.next }}">
                    Create New Account
                </a>
                <a href="{% url 'choose_role' %}?next={{ request.path }}">
                    Switch Role
                </a>
            </div>

        </form>
    </div>
</div>
{% endblock %}
