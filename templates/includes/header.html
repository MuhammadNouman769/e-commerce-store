{% load static %}
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>
.header_area {
    background: #ff6c00;
    border-bottom: 1px solid #eee;
    position: sticky;
    top: 0;
    z-index: 1000;
}

/* NAVBAR LAYOUT */
.navbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
}

/* LEFT */
.left-nav {
    display: flex;
    align-items: center;
    gap: 0px;
}

/* CENTER SEARCH */
.search-box {
    flex: 1;
    max-width: 500px;
    margin: 0 20px;
}

.search-box form {
    display: flex;
    border: 1px solid #ff6c00;
    border-radius: 25px;
    margin-top: 6px;
    overflow: hidden;
    background: #f9f9f9;
}

.search-box input {
    border-style:solid;;
    border-radius: 30px;
    border-color:#ff6c00;
    outline: none;
    padding: 10px 15px;
    width: 100%;
    background: transparent;
}

.search-box button {
    background: #fff;
    color: #ff6c00;
    border: solid 1px;
    padding: 0 18px;
    border-radius: 5px;
    cursor: pointer;
}
.search-box button:hover {
    color: #f57224;
    background: #fff;
    border: solid 1;


    
}

/* NAV LINKS */
.nav-link {
    font-size: 14px;
    color: #fff !important;
    margin: 0 10px;
    position: relative;
}

.nav-link:hover {
    font-weight: 800;    
}

/* RIGHT SIDE */
.nav-right {
    display: flex;
    align-items: center;
    gap: 18px;
}

/* CART */
.cart-wrapper {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: #f8f8f8;
    transition: all 0.3s ease;
    color: #f57224;
    font-size: 18px;
}
.cart-wrapper:hover {
    color: #f57224;
}



/* ICON */
.cart-wrapper i {
    font-size: 25px;
}

/* COUNT BADGE */
.cart-count {
    position: absolute;
    top: -6px;
    right: -6px;
    text-align: center;

    background: #fff;
    color: #f57224;

    font-size: 10px;
    font-weight: 600;

    min-width: 18px;
    height: 18px;

    display: flex;
    align-items: center;
    justify-content: center;

    border-radius: 50%;

    box-shadow: 0 2px 6px rgba(0,0,0,0.2);
}
/* USER DROPDOWN */
.user-menu {
    position: relative;
}

.user-btn {
    border: solid #fff 1px;
    cursor: pointer;
    color: #ff6c00;
    background: #fff;
    height: 36px;
    font-weight: 700;
    font-size: 14px;
}

.dropdown-box {
    position: absolute;
    right: 0;
    top: 45px;
    width: 200px;
    background: #fff;
    border-radius: 10px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    display: none;
    overflow: hidden;
}

.dropdown-box.show {
    display: block;
}

.dropdown-box a,
.dropdown-box button {
    width: 100%;
    padding: 12px;
    display: block;
    text-align: left;
    border: none;
    background: none;
}

.dropdown-box a:hover,
.dropdown-box button:hover {
    background: #f5f5f5;
    color: #f57224;
}

/* LOGIN BUTTON */
.auth-btn {
    border: 1px solid #f57224;
    padding: 6px 14px;
    border-radius: 6px;
    color: #f57224 !important;
    background: #fff;
}
.auth-btn:hover {
    font-weight: 600;
}

body.loading {
    cursor: wait;
}

body.loading::after {
    content: "";
    position: fixed;
    top: 50%;
    left: 50%;
    width: 40px;
    height: 40px;
    border: 4px solid #ccc;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 1s linear infinite;
    transform: translate(-50%, -50%);
    z-index: 9999;
}

@keyframes spin {
    to { transform: translate(-50%, -50%) rotate(360deg); }
}
</style>
<header class="header_area sticky-header">
<nav class="navbar container">
    <!-- LEFT -->
    <div class="left-nav">
        <a class="navbar-brand" href="{% url 'home' %}">
            <img src="{% static 'img/logo-1.png' %}" style="height:40px;">
        </a>
        <a class="nav-link" href="{% url 'home' %}">Home</a>
        <a class="nav-link" href="{% url 'products:product_list' %}">Products</a>
        <a class="nav-link" href="{% url 'contact_us' %}">Contact</a>
    </div>
    <!-- CENTER SEARCH  -->
    <div class="search-box">
        <form method="GET" action="{% url 'products:product_list' %}">
    <input type="text" name="q" placeholder="Search products..." value="{{ request.GET.q|default:'' }}">
    <button type="submit">
        <i class="fas fa-search"></i>
    </button>
</form>
    </div>
    <!-- RIGHT -->
    <div class="nav-right">
        <a href="{% url 'cart' %}" class="cart-wrapper">
            <i class="fas fa-shopping-cart"></i>
            <span id="cart-count" class="cart-count">{{ cart_count|default:"0" }}</span>
        </a>
        {% if request.user.is_authenticated %}
        <div class="user-menu">
            <button class="user-btn" onclick="toggleDropdown()">
                <i class="fas fa-user-circle"></i>
                {{ request.user.first_name|default:"Account" }}
            </button>
            <div class="dropdown-box">
                {% if request.user.role == 'seller' %}
                <a href="{% url 'products:product_list' %}">
                    <i class="fas fa-store"></i> Dashboard
                </a>
                {% endif %}
                <form method="post" action="{% url 'logout' %}">
                    {% csrf_token %}
                    <button type="submit">
                        <i class="fas fa-sign-out-alt"></i> Logout
                    </button>
                </form>
            </div>
        </div>
        {% else %}
        <a href="{% url 'choose_role' %}" class="auth-btn">
            Login
        </a>
        {% endif %}
    </div>
</nav>
</header>
<script>
function toggleDropdown() {
    document.querySelector(".dropdown-box").classList.toggle("show");
}

document.addEventListener("click", function(e) {
    let menu = document.querySelector(".user-menu");
    if (menu && !menu.contains(e.target)) {
        document.querySelector(".dropdown-box")?.classList.remove("show");
    }
});
</script>
<script>
document.querySelector(".search-box form").addEventListener("submit", function () {
    document.body.classList.add("loading");
});
</script>
