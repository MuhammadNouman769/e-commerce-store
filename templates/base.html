{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- Mobile Specific Meta -->
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <!-- Favicon-->
    <link rel="shortcut icon" href="{% static 'fav.png' %}">
    <!-- Author Meta -->
    <meta name="author" content="CodePixar">
    <!-- Meta Description -->
    <meta name="description" content="">
    <!-- Meta Keyword -->
    <meta name="keywords" content="">
    <!-- meta character set -->
    <meta charset="UTF-8">
    <!-- Site Title -->
    <title>{% block title %}Btr Store{% endblock %}</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'linearicons.css' %}">
    <link rel="stylesheet" href="{% static 'font-awesome.min.css' %}">
    <link rel="stylesheet" href="{% static 'themify-icons.css' %}">
    <link rel="stylesheet" href="{% static 'bootstrap.css' %}">
    <link rel="stylesheet" href="{% static 'owl.carousel.css' %}">
    <link rel="stylesheet" href="{% static 'nice-select.css' %}">
    <link rel="stylesheet" href="{% static 'nouislider.min.css' %}">
    <link rel="stylesheet" href="{% static 'ion.rangeSlider.css' %}" />
    <link rel="stylesheet" href="{% static 'ion.rangeSlider.skinFlat.css' %}" />
    <link rel="stylesheet" href="{% static 'magnific-popup.css' %}">
    <link rel="stylesheet" href="{% static 'main.css' %}">
</head>
<body>

    <!-- Header iclude -->
    {% include 'includes/header.html' %}
    
    <!--  Main Content -->
<main>      
    {% block content %}{% endblock %}
</main>   

<!--  Footer Include -->
{% include 'includes/footer.html' %}


<!--  Scripts Include -->
{% include 'includes/scripts.html' %}

</body>
</html>
